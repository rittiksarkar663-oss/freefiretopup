<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Fire TopUp Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f3f4f6;
}

/* HEADER */
header {
    background: #111827;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 20px;
    background: #1f2937;
    color: white;
}

/* CARDS */
.container {
    padding: 15px;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    text-align: center;
}

.price {
    color: green;
    font-weight: bold;
    margin: 5px 0;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 6px;
    cursor: pointer;
}

/* PAYMENT */
.pay {
    text-align: center;
    padding: 10px;
    background: white;
    margin: 15px;
    border-radius: 10px;
}

/* FOOTER */
footer {
    text-align: center;
    background: #111827;
    color: white;
    padding: 10px;
}

</style>
</head>

<body>

<header>
    Free Fire TopUp Store
</header>

<div class="hero">
    <h2>Fast & Trusted TopUp</h2>
    <p>Instant Diamond Delivery</p>
</div>

<div class="container">

    <div class="card">
        <h3>25 Diamonds</h3>
        <div class="price">৳22</div>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <h3>50 Diamonds</h3>
        <div class="price">৳40</div>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <h3>115 Diamonds</h3>
        <div class="price">৳85</div>
        <button>Buy Now</button>
    </div>

</div>

<div class="pay">
    <h3>Payment Method</h3>
    <p>bKash / Nagad</p>
</div>

<footer>
    © 2026 Free Fire TopUp Store
</footer>

</body>
</html>
